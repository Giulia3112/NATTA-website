services:
  - type: web
    name: natta-app
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/system.health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Banco de Dados (Supabase) ──────────────────────────────
      - key: DATABASE_URL
        sync: false   # cole no painel do Render

      # ── Firebase Admin (Backend) ───────────────────────────────
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

      # ── Admin ──────────────────────────────────────────────────
      - key: ADMIN_EMAIL
        value: alvaresgiulia@gmail.com

      # ── Firebase Client (baked no build do Vite) ──────────────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
